name: "Presentation Generator (PPTX)"
description: "トピックをリサーチしてリッチなPowerPoint(.pptx)ファイルを生成します。pptxgenjsでデザイン・図表を自由に表現し、生成後にPowerPointで直接編集可能です。"
inputs:
  - name: "topic"
    type: "string"
    description: "プレゼンのテーマ"
  - name: "num_slides"
    type: "integer"
    description: "生成するスライド数（デフォルト: 8）"

nodes:
  # Step 1: トピックをリサーチして最新情報を収集する（初回1クエリ）
  - id: "research"
    type: "skill"
    skill: "web_search"
    params:
      query: "{{inputs.topic}} 最新動向 2024 2025"
    next: "judge_depth"

  # Step 2: 深掘りが必要かどうかをLLMが判断する
  - id: "judge_depth"
    type: "llm"
    model: "gpt-4o"
    prompt: |
      以下のリサーチ結果を読み、トピック「{{inputs.topic}}」について
      プレゼンテーション（約{{inputs.num_slides}}枚）を作成するために
      追加の深掘りリサーチが必要かどうかを判断してください。

      ## 初回リサーチ結果
      {{research.output}}

      ## 判断基準
      - **deep（深掘り必要）**: 以下のいずれかに該当する場合
        - 具体的な数値・統計データが不足している
        - 複数の観点（技術・ビジネス・社会的影響など）の情報が必要
        - トピックが専門的で最新情報が重要
        - スライド数が6枚以上でコンテンツの充実が必要
      - **shallow（不要）**: 以下のいずれかに該当する場合
        - 初回リサーチで十分な情報量・具体性がある
        - トピックが一般的で追加情報が少ない
        - スライド数が少なく現在の情報で十分

      ## 出力形式
      `deep` または `shallow` の1単語のみを出力してください。他の文字は一切含めないこと。
    next: "route_research"

  # Step 3: 深掘り判断に基づいて分岐
  - id: "route_research"
    type: "condition"
    params:
      source: "judge_depth"
    branches:
      deep: "plan_queries"
      shallow: "merge_research"

  # Step 4a（deepルート）: 追加検索クエリを生成する
  - id: "plan_queries"
    type: "llm"
    model: "gpt-4o"
    output_format: "json"
    prompt: |
      トピック「{{inputs.topic}}」について、初回リサーチで不足している情報を補うための
      追加検索クエリを3つ生成してください。

      ## 初回リサーチ結果
      {{research.output}}

      ## 出力形式（JSON）
      {"queries": ["クエリ1", "クエリ2", "クエリ3"]}

      初回リサーチと重複しない、具体的・多角的なクエリにしてください。
    next: "deep_research"

  # Step 4b（deepルート）: 複数クエリでweb検索を実行する
  - id: "deep_research"
    type: "foreach"
    items: "{{plan_queries.output.queries}}"
    node:
      type: "skill"
      skill: "web_search"
      params:
        query: "{{item}}"
    next: "analyze_deep"

  # Step 4c（deepルート）: 各検索結果を個別に要約する
  - id: "analyze_deep"
    type: "foreach"
    items: "{{deep_research.output}}"
    node:
      type: "llm"
      model: "gpt-4o-mini"
      prompt: |
        以下の検索結果から、トピック「{{inputs.topic}}」のプレゼンに役立つ
        重要な情報を箇条書きで3点以内に要約してください。数値・データを優先してください。

        ## 検索結果
        {{item}}
    next: "merge_research"

  # Step 5（両ルート共通）: リサーチ結果を統合・整理する
  - id: "merge_research"
    type: "llm"
    model: "gpt-4o-mini"
    prompt: |
      以下のリサーチ結果を統合して、トピック「{{inputs.topic}}」に関する重要情報を
      箇条書きサマリーにまとめてください。
      具体的な数値・統計・事例を優先して抽出し、重複は除去してください。

      ## 初回リサーチ
      {{research.output}}

      ## 追加リサーチ要約（深掘りした場合のみ）
      {{analyze_deep.output}}
    next: "create_concept"

  # Step 6（両ルート共通）: concept.md（スライド骨子）を生成・保存する
  - id: "create_concept"
    type: "llm"
    model: "gpt-5-mini"
    prompt: |
      あなたはプロのプレゼンテーション戦略家です。
      以下のリサーチ結果をもとに、トピック「{{inputs.topic}}」について約{{inputs.num_slides}}枚の
      プレゼンテーション骨子をMarkdown形式で作成してください。

      ## リサーチ結果
      {{merge_research.output}}

      ## 出力形式（Manusスタイルの詳細な骨子）
      以下の形式で各スライドを定義してください:

      # {{inputs.topic}}
      ## Slide Content Outline ({{inputs.num_slides}} Slides)

      ---

      ## Slide N: [スライドタイトル]

      **Title:** [スライドのタイトル]
      **Heading Insight:** [このスライドで伝えたい核心メッセージ（1文）]

      **Key Points:**
      - **[ポイント名]:** [具体的な内容・データ・数値]
      - ...

      **[Chart/Table/Comparison]:** （図表が必要な場合）
      | 列1 | 列2 | 列3 |
      |---|---|---|
      | データ | データ | データ |

      **Transition:** [次のスライドへの橋渡しメッセージ]

      ---

      ## 要件
      - 必ず最初はタイトルスライド、最後はまとめ・CTAスライドにすること
      - リサーチ結果から具体的な数値・データを積極的に引用すること
      - 各スライドにHeading Insightを必ず含めること（聴衆が1つだけ覚えるべきメッセージ）
      - 図表（テーブル・グラフ）が必要なスライドはその内容も記載すること
      - 日本語で作成すること
    next: "save_concept"

  # Step 3: concept.mdをファイルに保存する
  - id: "save_concept"
    type: "skill"
    skill: "file_write"
    params:
      file_path: "output/{{inputs.topic}}_concept.md"
      content: "{{create_concept.output}}"
    next: "generate_script"

  # Step 4: concept.mdをもとにpptxgenjsスクリプトを生成する
  - id: "generate_script"
    type: "llm"
    model: "gpt-5-mini"
    prompt: |
      あなたはプロのプレゼンテーションデザイナー兼エンジニアです。
      以下のスライド骨子をもとに、トピック「{{inputs.topic}}」の
      高品質なPowerPointプレゼンテーションを生成するpptxgenjsのNode.jsスクリプトを作成してください。

      ## スライド骨子（concept.md）
      {{create_concept.output}}

      ## 技術仕様
      - `const PptxGenJS = require("pptxgenjs");` でライブラリを読み込む
      - `pres.writeFile({ fileName: "OUTPUT_PATH" });` で保存（OUTPUT_PATHはそのまま記載）
      - スライドサイズ: 幅10インチ × 高さ7.5インチ（16:9デフォルト）

      ## ⚠️ レイアウト厳守ルール（必ず守ること）
      - **addTextには必ずx, y, w, hを全て指定すること**（省略禁止）
      - **y + h ≤ 7.3 を厳守**（スライド高さ7.5インチからはみ出さないこと）
      - **x + w ≤ 9.8 を厳守**（スライド幅10インチからはみ出さないこと）
      - コンテンツエリアは y=1.3 〜 y=7.0 の範囲内に収めること
      - ヘッダーバーの高さは h=1.2 固定とし、コンテンツは y=1.4 から開始すること
      - 1スライドに配置するテキストボックスは最大3〜4個まで
      - **`pres.layout`および`pres.setLayout()`は絶対に使用禁止**（UNKNOWN-LAYOUTエラーの原因）
      - **`pres.defineLayout()`も使用禁止**。スライドサイズ変更は一切行わないこと

      ## 座標レイアウトテンプレート（必ずこれに従うこと）
      ```
      ヘッダーバー:  x=0,   y=0,   w="100%", h=1.2
      タイトル文字:  x=0.3, y=0.2, w=9.4,    h=0.8
      本文エリア:    x=0.5, y=1.4, w=9.0,    h=5.4  （最大）
      チャート:      x=0.5, y=1.4, w=9.0,    h=5.0
      テーブル:      x=0.5, y=1.4, w=9.0,    h=5.0
      左カラム:      x=0.3, y=1.4, w=4.5,    h=5.4
      右カラム:      x=5.2, y=1.4, w=4.5,    h=5.4
      ```

      ## デザイン要件
      - プロフェッショナルで洗練されたデザインにすること
      - カラーテーマを統一すること（メインカラー: "1F497D"、アクセント: "ED7D31"、テキスト: "363636"）
      - フォントサイズ: ヘッダータイトル24pt、本文14-16pt
      - 余白を適切に取り、テキストが詰まりすぎないようにすること

      ## スライド構成要件（約{{inputs.num_slides}}枚）
      1. タイトルスライド（全面カラー背景、タイトル・サブタイトル・日付）
      2. アジェンダスライド（目次）
      3〜N-1. コンテンツスライド（リサーチ結果を活用した具体的・実践的な内容）
         - 箇条書きスライド（addText配列で各行を個別に配置）
         - 棒グラフまたは折れ線グラフ（addChart使用、リサーチ結果から数値を推定）
         - テーブル（addTable使用）
         - 2カラム比較スライド
      N. まとめ・結論スライド

      ## pptxgenjsのAPI参考（座標を必ず明示すること）
      ```javascript
      // ヘッダーバー（全スライド共通パターン）
      slide.addShape(pres.ShapeType.rect, { x: 0, y: 0, w: "100%", h: 1.2, fill: { color: "1F497D" }, line: { color: "1F497D" } });
      slide.addText("スライドタイトル", { x: 0.3, y: 0.2, w: 9.4, h: 0.8, fontSize: 24, color: "FFFFFF", bold: true });

      // 本文テキスト（w, h必須）
      slide.addText("テキスト", { x: 0.5, y: 1.4, w: 9.0, h: 0.6, fontSize: 16, color: "363636" });

      // 箇条書き（配列形式、w, h必須）
      slide.addText([
        { text: "• 項目1", options: { fontSize: 15, color: "363636", breakLine: true } },
        { text: "• 項目2", options: { fontSize: 15, color: "363636", breakLine: true } },
        { text: "• 項目3", options: { fontSize: 15, color: "363636" } }
      ], { x: 0.5, y: 1.4, w: 9.0, h: 5.4 });

      // 棒グラフ（y+h=6.4以内）
      slide.addChart(pres.ChartType.bar, [{ name: "系列名", labels: ["A","B","C"], values: [10,20,30] }],
        { x: 0.5, y: 1.4, w: 9.0, h: 5.0, chartColors: ["1F497D","ED7D31","2E75B6"] });

      // テーブル（行数に応じてhを調整、y+h≤7.3）
      slide.addTable(rows, { x: 0.5, y: 1.4, w: 9.0, colW: [3,3,3],
        border: { type: "solid", pt: 1, color: "CCCCCC" },
        fill: "F5F5F5" });

      // タイトルスライド（全面背景）
      slide.addShape(pres.ShapeType.rect, { x: 0, y: 0, w: "100%", h: "100%", fill: { color: "1F497D" }, line: { color: "1F497D" } });
      slide.addText("メインタイトル",    { x: 0.8, y: 2.5, w: 8.4, h: 1.2, fontSize: 36, color: "FFFFFF", bold: true });
      slide.addText("サブタイトル",      { x: 0.8, y: 4.0, w: 8.4, h: 0.8, fontSize: 20, color: "D6E4F0" });
      slide.addText("2025年",           { x: 0.8, y: 5.0, w: 8.4, h: 0.6, fontSize: 16, color: "D6E4F0" });
      ```

      ## 出力形式
      Node.jsスクリプトのコードのみを出力してください（説明文・コードブロック記号不要）。
      必ず日本語コンテンツで作成してください。
    next: "save_pptx"

  # Step 3: スクリプトを実行してPPTXを生成する
  - id: "save_pptx"
    type: "skill"
    skill: "generate_pptx_js"
    params:
      script: "{{generate_script.output}}"
      file_path: "output/{{inputs.topic}}.pptx"
    next: "end"
